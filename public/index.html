<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeVault — Bot Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: { 950: '#08080f', 900: '#0f0f1a', 800: '#161623', 700: '#1e1e2e', 600: '#26263a', 500: '#32324a' }
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #08080f; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #32324a; border-radius: 3px; }
  </style>
</head>
<body class="text-gray-100 min-h-screen antialiased">

  <!-- Auth Modal -->
  <div id="authModal" class="fixed inset-0 bg-black/70 backdrop-blur-md flex items-center justify-center z-50 hidden">
    <div class="bg-surface-700 border border-surface-500 rounded-2xl p-8 w-full max-w-sm mx-4 fade-in">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-10 h-10 rounded-xl bg-blue-600/20 flex items-center justify-center">
          <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
        </div>
        <div>
          <h2 class="font-semibold text-white">Dashboard Access</h2>
          <p class="text-gray-500 text-xs">TradeVault Bot</p>
        </div>
      </div>
      <input
        id="tokenInput"
        type="password"
        placeholder="Enter your dashboard token"
        class="w-full bg-surface-900 border border-surface-500 focus:border-blue-500 rounded-xl px-4 py-3 text-sm outline-none transition-colors mb-3"
      />
      <p id="authError" class="text-red-400 text-xs mb-3 hidden">Invalid token — try again.</p>
      <button
        onclick="submitToken()"
        class="w-full bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white rounded-xl py-3 text-sm font-medium transition-colors"
      >
        Enter Dashboard
      </button>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden">
    <div class="max-w-7xl mx-auto px-6 py-8">

      <!-- Header -->
      <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-xl bg-blue-600/20 flex items-center justify-center">
            <svg class="w-5 h-5 text-blue-400" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.869 4.326-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.833.941z"/>
            </svg>
          </div>
          <div>
            <h1 class="font-bold text-lg leading-none">TradeVault</h1>
            <p class="text-gray-600 text-xs mt-0.5">Bot Dashboard</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span id="lastUpdated" class="text-gray-700 text-xs"></span>
          <button
            onclick="loadLeads()"
            id="refreshBtn"
            class="flex items-center gap-2 bg-surface-700 hover:bg-surface-600 border border-surface-500 rounded-xl px-4 py-2 text-sm transition-colors"
          >
            <svg id="refreshIcon" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            Refresh
          </button>
          <button onclick="signOut()" class="text-gray-700 hover:text-gray-400 text-xs transition-colors">Sign out</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
        <div class="bg-surface-700 border border-surface-500 rounded-2xl p-5">
          <p class="text-gray-600 text-xs uppercase tracking-widest mb-3">Total Leads</p>
          <p id="statTotal" class="text-4xl font-bold">—</p>
        </div>
        <div class="bg-surface-700 border border-surface-500 rounded-2xl p-5">
          <p class="text-gray-600 text-xs uppercase tracking-widest mb-3">Completed</p>
          <p id="statDone" class="text-4xl font-bold text-green-400">—</p>
        </div>
        <div class="bg-surface-700 border border-surface-500 rounded-2xl p-5">
          <p class="text-gray-600 text-xs uppercase tracking-widest mb-3">Today</p>
          <p id="statToday" class="text-4xl font-bold text-blue-400">—</p>
        </div>
      </div>

      <!-- Search -->
      <div class="relative mb-4">
        <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-600 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input
          id="search"
          type="text"
          placeholder="Search by name, email or username…"
          oninput="renderTable()"
          class="w-full bg-surface-700 border border-surface-500 focus:border-blue-500 rounded-xl pl-11 pr-4 py-3 text-sm outline-none transition-colors"
        />
      </div>

      <!-- Table -->
      <div class="bg-surface-700 border border-surface-500 rounded-2xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-surface-600">
                <th class="text-left px-6 py-4 text-gray-600 text-xs uppercase tracking-widest font-medium">User</th>
                <th class="text-left px-6 py-4 text-gray-600 text-xs uppercase tracking-widest font-medium">Name</th>
                <th class="text-left px-6 py-4 text-gray-600 text-xs uppercase tracking-widest font-medium">Email</th>
                <th class="text-left px-6 py-4 text-gray-600 text-xs uppercase tracking-widest font-medium">Choices</th>
                <th class="text-left px-6 py-4 text-gray-600 text-xs uppercase tracking-widest font-medium">Status</th>
                <th class="text-left px-6 py-4 text-gray-600 text-xs uppercase tracking-widest font-medium">Last Active</th>
                <th class="px-6 py-4"></th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr>
                <td colspan="7" class="px-6 py-20 text-center text-gray-700">
                  <svg class="w-6 h-6 mx-auto mb-3 animate-spin text-gray-700" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                  </svg>
                  Loading…
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Footer -->
      <p class="text-center text-gray-800 text-xs mt-6">Auto-refreshes every 30 seconds</p>

    </div>
  </div>

  <script>
    let allLeads = [];

    const getToken = () => localStorage.getItem('tv_token') || '';

    function submitToken() {
      const val = document.getElementById('tokenInput').value.trim();
      if (!val) return;
      localStorage.setItem('tv_token', val);
      document.getElementById('authError').classList.add('hidden');
      loadLeads();
    }

    function signOut() {
      localStorage.removeItem('tv_token');
      document.getElementById('app').classList.add('hidden');
      document.getElementById('authModal').classList.remove('hidden');
      document.getElementById('tokenInput').value = '';
    }

    async function loadLeads() {
      const token = getToken();
      if (!token) {
        document.getElementById('authModal').classList.remove('hidden');
        return;
      }

      const icon = document.getElementById('refreshIcon');
      icon.classList.add('animate-spin');

      try {
        const res = await fetch(`/api/leads?token=${encodeURIComponent(token)}`);
        if (res.status === 401) {
          document.getElementById('authError').classList.remove('hidden');
          document.getElementById('authModal').classList.remove('hidden');
          document.getElementById('app').classList.add('hidden');
          return;
        }
        allLeads = await res.json();
        document.getElementById('authModal').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        updateStats();
        renderTable();
        document.getElementById('lastUpdated').textContent =
          'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      } catch (e) {
        console.error('Load error:', e);
      } finally {
        icon.classList.remove('animate-spin');
      }
    }

    function updateStats() {
      const today = new Date().toDateString();
      document.getElementById('statTotal').textContent = allLeads.length;
      document.getElementById('statDone').textContent = allLeads.filter(l => l.done).length;
      document.getElementById('statToday').textContent = allLeads.filter(l =>
        l.updated_at && new Date(l.updated_at).toDateString() === today
      ).length;
    }

    function renderTable() {
      const q = document.getElementById('search').value.toLowerCase();
      const leads = q
        ? allLeads.filter(l =>
            (l.username || '').toLowerCase().includes(q) ||
            (l.full_name || '').toLowerCase().includes(q) ||
            (l.email || '').toLowerCase().includes(q)
          )
        : allLeads;

      const tbody = document.getElementById('tableBody');

      if (!leads.length) {
        tbody.innerHTML = `
          <tr><td colspan="7" class="px-6 py-20 text-center text-gray-700">
            ${q ? 'No results for "' + q + '".' : 'No leads yet. Send /start to your bot to get started.'}
          </td></tr>`;
        return;
      }

      tbody.innerHTML = leads.map(lead => {
        const initials = ((lead.full_name || lead.username || '?') + ' ').trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();
        const choices  = (lead.choices || []).length ? lead.choices.join(' → ') : '—';
        const ago      = lead.updated_at ? timeAgo(new Date(lead.updated_at)) : '—';

        const tgBtn = lead.username
          ? `<a href="https://t.me/${encodeURIComponent(lead.username)}" target="_blank" rel="noopener"
               class="inline-flex items-center gap-1.5 bg-blue-600 hover:bg-blue-500 active:scale-95 text-white rounded-lg px-3 py-1.5 text-xs font-medium transition-all whitespace-nowrap">
               <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24">
                 <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.869 4.326-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.833.941z"/>
               </svg>
               Open Chat
             </a>`
          : `<span class="text-gray-700 text-xs">No username</span>`;

        const statusBadge = lead.done
          ? `<span class="inline-flex items-center gap-1 bg-green-500/10 text-green-400 border border-green-500/20 rounded-full px-2.5 py-1 text-xs font-medium">
               <span class="w-1.5 h-1.5 rounded-full bg-green-400"></span>Done
             </span>`
          : `<span class="inline-flex items-center gap-1 bg-yellow-500/10 text-yellow-400 border border-yellow-500/20 rounded-full px-2.5 py-1 text-xs font-medium">
               <span class="w-1.5 h-1.5 rounded-full bg-yellow-400 animate-pulse"></span>Active
             </span>`;

        return `
          <tr class="border-t border-surface-600 hover:bg-surface-600/40 transition-colors">
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-600/30 to-purple-600/30 border border-blue-500/20 text-blue-300 flex items-center justify-center text-xs font-bold flex-shrink-0">
                  ${initials}
                </div>
                <span class="text-gray-400 text-xs">${lead.username ? '@' + lead.username : 'ID ' + lead.chat_id}</span>
              </div>
            </td>
            <td class="px-6 py-4 font-medium text-gray-200">${lead.full_name || '—'}</td>
            <td class="px-6 py-4 text-gray-400">${lead.email || '—'}</td>
            <td class="px-6 py-4 text-gray-500 text-xs max-w-[180px] truncate" title="${choices}">${choices}</td>
            <td class="px-6 py-4">${statusBadge}</td>
            <td class="px-6 py-4 text-gray-600 text-xs whitespace-nowrap">${ago}</td>
            <td class="px-6 py-4">${tgBtn}</td>
          </tr>`;
      }).join('');
    }

    function timeAgo(date) {
      const s = Math.floor((Date.now() - date) / 1000);
      if (s < 60) return 'Just now';
      if (s < 3600) return Math.floor(s / 60) + 'm ago';
      if (s < 86400) return Math.floor(s / 3600) + 'h ago';
      return Math.floor(s / 86400) + 'd ago';
    }

    document.getElementById('tokenInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitToken();
    });

    setInterval(loadLeads, 30000);

    if (getToken()) loadLeads();
    else document.getElementById('authModal').classList.remove('hidden');
  </script>
</body>
</html>
